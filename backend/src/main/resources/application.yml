server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: search-engine

  elasticsearch:
    uris: http://localhost:9200

  # 数据源（按需修改为实际库地址）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/search_engine?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000

  # Redis（按需修改）
  data:
    redis:
      host: localhost
      port: 6379
      password: ''
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.searchengine.**.entity
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Gitee API（搜索用户等）
gitee:
  api:
    base-url: https://gitee.com/api/v5
    access-token: ''   # 可选，填写后可提高限流与权限

# 日志
logging:
  level:
    root: INFO
    com.searchengine: DEBUG
    com.baomidou.mybatisplus: DEBUG
